<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tinta y Rebeldía — La gráfica del Cordobazo como lenguaje de resistencia</title>
<meta name="description" content="Documental multimedia interactivo sobre el Cordobazo de 1969 a través de la gráfica de resistencia.">
<link rel="stylesheet" href="assets/css/base.css">
<style>
  .landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    padding: var(--r-3);
    isolation: isolate;
  }

.landing__fondo {
  position: absolute;
  inset: 0;
  z-index: -2;
  width: 100%;
  height: 100%; /* Asegura que ocupe todo el espacio del main */
  
  /* Cargamos la imagen directamente desde la raíz */
  background: 
    radial-gradient(ellipse at 50% 20%, rgba(110, 20, 35, 0.25), transparent 60%),
    url("assets/img/fondo-landing-page.jpg") no-repeat center center;
  
  background-size: cover; 
  background-color: var(--negro); 
}

  .landing__eyebrow {
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: subir 900ms 200ms ease forwards;
  }

  .landing__titulo {
    font-size: clamp(2rem, 8vw, 5.5rem);
    color: var(--hueso);
    text-shadow: 0.04em 0.04em 0 var(--bordo);
    opacity: 0;
    animation: subir 900ms 400ms ease forwards;
  }

  .landing__subtitulo {
    margin-top: var(--r-3);
    max-width: 38ch;
    font-size: clamp(1.05rem, 2.4vw, 1.4rem);
    opacity: 0;
    animation: subir 900ms 700ms ease forwards;
  }

  .landing__cta {
    margin-top: 1.5rem;
    opacity: 0;
    animation: subir 900ms 1000ms ease forwards;
  }

  @keyframes subir {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .landing__nota {
    position: absolute;
    bottom: var(--r-3);
    left: 0;
    right: 0;
    margin-inline: auto;
    width: 90%;
    max-width: 400px;
    text-align: center;
    font-family: var(--f-subtitulo);
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--hueso-op);
    opacity: 0;
    animation: subir 900ms 1300ms ease forwards;
  }

  @media (prefers-reduced-motion: reduce) {
    .landing__eyebrow, .landing__titulo, .landing__subtitulo,
    .landing__cta, .landing__nota {
      animation: none;
      opacity: 1;
    }
  }
</style>
</head>
<body>

<main class="landing">
   <div class="landing__fondo" aria-hidden="true"></div>

  <p class="landing__eyebrow eyebrow">Documental multimedia interactivo</p>
  <h1 class="landing__titulo">Tinta y<br>Rebeldía</h1>
  <p class="landing__subtitulo lead">La gráfica del Cordobazo como lenguaje de resistencia.</p>

  <a class="landing__cta btn btn--solido" href="contexto.html">Comenzar la experiencia</a>

  <p class="landing__nota">29 de mayo de 1969 — Córdoba, Argentina</p>
</main>

</body>
</html>
